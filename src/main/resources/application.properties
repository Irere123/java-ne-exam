spring.application.name=java-exam

# ===================================================================
# DATABASE (PostgreSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/java_exam}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate. Schema is owned by Flyway, so Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# FLYWAY (database migrations in src/main/resources/db/migration)
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# ===================================================================
# MAIL (SMTP) - supply real credentials via environment variables
# ===================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===================================================================
# APPLICATION SETTINGS
# ===================================================================
# Base URL used to build the email-verification link sent to users.
app.base-url=${APP_BASE_URL:http://localhost:8080}
# "From" address on outgoing verification emails.
app.mail.from=${MAIL_FROM:no-reply@java-exam.local}

# JWT signing. The secret MUST be a Base64-encoded value of at least 256 bits.
# Generate one with:  openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:Yk9wQ2x2N3pHc1J0VWlPcEFzRGZHaEprTHpYY1ZiTm1Rd0VyVHk=}
# Access token lifetime in milliseconds (default 24h).
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Verification token lifetime in minutes (default 24h).
app.verification.expiration-minutes=${VERIFICATION_EXPIRATION_MINUTES:1440}

# Seed admin account created on startup if it does not already exist.
app.admin.email=${ADMIN_EMAIL:admin@java-exam.local}
app.admin.password=${ADMIN_PASSWORD:admin12345}
app.admin.first-name=${ADMIN_FIRST_NAME:System}
app.admin.last-name=${ADMIN_LAST_NAME:Administrator}
