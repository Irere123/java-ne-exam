spring.application.name=java-exam

# ===================================================================
# DATABASE (PostgreSQL)
# ===================================================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/java_exam}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate. Schema is owned by Flyway, so Hibernate only validates it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# FLYWAY (database migrations in src/main/resources/db/migration)
#   - db/migration            : portable DDL (runs on PostgreSQL and H2).
#   - db/specific/{vendor}     : vendor-only routines. {vendor} resolves to
#                                "postgresql" at runtime and "h2" under tests,
#                                so the PL/pgSQL triggers/procedure (Task 6)
#                                never reach H2. Kept OUTSIDE db/migration so
#                                Flyway's recursive scan does not load both.
# ===================================================================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration,classpath:db/specific/{vendor}

# ===================================================================
# MAIL (SMTP) - supply real credentials via environment variables
# ===================================================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:irere2050@gmail.com}
spring.mail.password=${MAIL_PASSWORD:zqey koaf bkqz qokt}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
