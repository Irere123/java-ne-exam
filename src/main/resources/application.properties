# ===================================================================
# APPLICATION SETTINGS
# ===================================================================
# Base URL used to build the email-verification link sent to users.
app.base-url=${APP_BASE_URL:http://localhost:8080}
# "From" address on outgoing verification emails.
app.mail.from=${MAIL_FROM:no-reply@java-exam.local}

# JWT signing. The secret MUST be a Base64-encoded value of at least 256 bits.
# Generate one with:  openssl rand -base64 32
app.jwt.secret=${JWT_SECRET:Yk9wQ2x2N3pHc1J0VWlPcEFzRGZHaEprTHpYY1ZiTm1Rd0VyVHk=}
# Short-lived access token (default 15 minutes).
app.jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
# Long-lived refresh token (default 7 days). Rotated on every /refresh.
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# Email-verification token lifetime in minutes (default 24h).
app.verification.expiration-minutes=${VERIFICATION_EXPIRATION_MINUTES:1440}
# Password-reset token lifetime in minutes (default 1h).
app.password-reset.expiration-minutes=${PASSWORD_RESET_EXPIRATION_MINUTES:60}
# How often (ms) to purge expired denylist / verification / reset tokens (default 1h).
app.cleanup.interval-ms=${CLEANUP_INTERVAL_MS:3600000}
# How often (ms) to email pending customer notifications (default 30s).
app.notifications.dispatch-interval-ms=${NOTIFICATION_DISPATCH_INTERVAL_MS:30000}

# Seed admin account created on startup if it does not already exist.
app.admin.email=${ADMIN_EMAIL:admin@java-exam.local}
app.admin.password=${ADMIN_PASSWORD:admin12345}
app.admin.first-name=${ADMIN_FIRST_NAME:System}
app.admin.last-name=${ADMIN_LAST_NAME:Administrator}
app.admin.phone=${ADMIN_PHONE:788000000}

# ===================================================================
# OPENAPI / SWAGGER (springdoc)
#   Swagger UI:   http://localhost:8080/swagger-ui.html
#   OpenAPI JSON: http://localhost:8080/v3/api-docs
# ===================================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
