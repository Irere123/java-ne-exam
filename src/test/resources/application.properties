# Test profile: use an in-memory H2 database (PostgreSQL-compatible mode) so the
# context loads without a live PostgreSQL/SMTP server. Flyway runs the same
# migrations against H2.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true

# JavaMailSender is auto-configured but never connects during tests.
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=
spring.mail.password=

app.base-url=http://localhost:8080
app.mail.from=no-reply@java-exam.local
